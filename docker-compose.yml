services:

  postgres:
    image: postgres:15
    container_name: mlflow_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: mlflow_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Console UI
    volumes:
      - ./minio_data:/data
    networks:
      - default
      - minio_shared

  create_bucket:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set myminio http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
      mc mb myminio/${MLFLOW_BUCKET};
      mc policy set public myminio/${MLFLOW_BUCKET};
      exit 0;
      "

  mlflow:
    image: python:3.11-slim
    container_name: mlflow_server
    depends_on:
      - postgres
      - minio
      - create_bucket
    ports:
      - "5000:5000"
    environment:
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      MLFLOW_S3_ENDPOINT_URL: ${MLFLOW_S3_ENDPOINT_URL}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000', timeout=5)\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    command: >
      bash -c "
      pip install mlflow psycopg2-binary boto3 &&
      mlflow server
      --host 0.0.0.0
      --port 5000
      --allowed-hosts '${MLFLOW_SERVER_ALLOWED_HOSTS}'
      --backend-store-uri postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      --default-artifact-root s3://${MLFLOW_BUCKET}
      "

  credit_api:
    build:
      context: ./prod
      dockerfile: dockerfile
    container_name: credit_scoring_api
    hostname: credit-scoring-api
    depends_on:
      mlflow:
        condition: service_healthy
      minio:
        condition: service_started
    ports:
      - "8000:8000"
    environment:
      # Importante: Usamos os nomes dos serviços do Docker Compose como hosts
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI}
      # Usa versão registrada existente no MLflow
      MLFLOW_MODEL_URI: ${MLFLOW_MODEL_URI}
      RUN_ID: ${RUN_ID}
      MLFLOW_MODEL_ARTIFACT_PATH: ${MLFLOW_MODEL_ARTIFACT_PATH}
      MLFLOW_MODEL_NAME: ${MLFLOW_MODEL_NAME}
      MLFLOW_MODEL_STAGE: ${MLFLOW_MODEL_STAGE}
      MLFLOW_S3_ENDPOINT_URL: ${MLFLOW_S3_ENDPOINT_URL}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      MLFLOW_S3_IGNORE_TLS: ${MLFLOW_S3_IGNORE_TLS}
      SPARK_MASTER_URL: ${SPARK_MASTER_URL:-spark://spark-master:7077}
      SPARK_HIVE_METASTORE_URIS: ${SPARK_HIVE_METASTORE_URIS:-thrift://hive-metastore:9083}
      SPARK_SQL_WAREHOUSE_DIR: ${SPARK_SQL_WAREHOUSE_DIR:-s3a://lakehouse/}
      SPARK_DRIVER_HOST: ${SPARK_DRIVER_HOST:-credit-scoring-api}
      SPARK_S3A_ENDPOINT: ${SPARK_S3A_ENDPOINT:-http://minio:9000}
      PYSPARK_DRIVER_PYTHON: ${PYSPARK_DRIVER_PYTHON:-python3}
      PYSPARK_PYTHON: ${PYSPARK_PYTHON:-python3}
      PREDICTION_LOG_DATABASE: ${PREDICTION_LOG_DATABASE:-forecast}
      PREDICTION_LOG_TABLE: ${PREDICTION_LOG_TABLE:-prediction_events}
      PREDICTION_LOG_ENABLED: ${PREDICTION_LOG_ENABLED:-true}
      PREDICTION_LOG_STRICT: ${PREDICTION_LOG_STRICT:-true}
    networks:
      - default
      - minio_shared
      - credit_risk_shared

networks:
  minio_shared:
    external: true
    name: minio_minio
  credit_risk_shared:
    external: true
    name: credit_risk_shared