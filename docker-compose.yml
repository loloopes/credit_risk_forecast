services:

  postgres:
    image: postgres:15
    container_name: mlflow_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: mlflow_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Console UI
    volumes:
      - ./minio_data:/data

  create_bucket:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set myminio http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
      mc mb myminio/${MLFLOW_BUCKET};
      mc policy set public myminio/${MLFLOW_BUCKET};
      exit 0;
      "

  mlflow:
    image: python:3.11-slim
    container_name: mlflow_server
    depends_on:
      - postgres
      - minio
      - create_bucket
    ports:
      - "5000:5000"
    environment:
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      MLFLOW_S3_ENDPOINT_URL: ${MLFLOW_S3_ENDPOINT_URL}
    command: >
      bash -c "
      pip install mlflow psycopg2-binary boto3 &&
      mlflow server
      --host 0.0.0.0
      --port 5000
      --allowed-hosts '${MLFLOW_SERVER_ALLOWED_HOSTS}'
      --backend-store-uri postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      --default-artifact-root s3://${MLFLOW_BUCKET}
      "

  credit_api:
    build:
      context: ./prod
      dockerfile: Dockerfile
    container_name: credit_scoring_api
    depends_on:
      - mlflow
      - minio
    ports:
      - "8000:8000"
    environment:
      # Importante: Usamos os nomes dos serviços do Docker Compose como hosts
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI}
      # Usa versão registrada existente no MLflow
      MLFLOW_MODEL_URI: ${MLFLOW_MODEL_URI}
      RUN_ID: ${RUN_ID}
      MLFLOW_MODEL_ARTIFACT_PATH: ${MLFLOW_MODEL_ARTIFACT_PATH}
      MLFLOW_MODEL_NAME: ${MLFLOW_MODEL_NAME}
      MLFLOW_MODEL_STAGE: ${MLFLOW_MODEL_STAGE}
      MLFLOW_S3_ENDPOINT_URL: ${MLFLOW_S3_ENDPOINT_URL}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      MLFLOW_S3_IGNORE_TLS: ${MLFLOW_S3_IGNORE_TLS}