name: CI/CD

on:
  pull_request:
    branches: [master, main]
  push:
    branches: [master, main]

permissions:
  contents: read
  packages: write

jobs:
  ci:
    name: Run tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    env:
      PYTHONPATH: ${{ github.workspace }}
      SKIP_MODEL_LOAD: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements-ci.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Run tests
        run: python -m pytest -q tests

  cd:
    name: Build and publish API image
    needs:
      - ci
      - trigger-airflow
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Docker image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/credit-api
          tags: |
            type=ref,event=branch
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./prod
          file: ./prod/dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  trigger-airflow:
    name: Trigger Airflow retraining DAG
    needs: ci
    if: >
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    # Poll can run up to ~30 min (60 × 30s); allow headroom. Exit 137 is often SIGKILL (OOM or runner limits).
    timeout-minutes: 120
    runs-on:
      - self-hosted
      - Linux
      - X64
      - vpn
    env:
      AIRFLOW_API_URL: ${{ secrets.AIRFLOW_API_URL || vars.AIRFLOW_API_URL }}
      AIRFLOW_API_USERNAME: ${{ secrets.AIRFLOW_API_USERNAME }}
      AIRFLOW_API_PASSWORD: ${{ secrets.AIRFLOW_API_PASSWORD }}
    steps:
      - name: Airflow secret diagnostics (no values printed)
        run: |
          echo "repo=${GITHUB_REPOSITORY}"
          echo "ref=${GITHUB_REF}"
          echo "event=${GITHUB_EVENT_NAME}"
          echo -n "AIRFLOW_API_URL: "
          [ -n "${AIRFLOW_API_URL}" ] && echo "set" || echo "MISSING"
          echo -n "AIRFLOW_API_USERNAME: "
          [ -n "${AIRFLOW_API_USERNAME}" ] && echo "set" || echo "MISSING"
          echo -n "AIRFLOW_API_PASSWORD: "
          [ -n "${AIRFLOW_API_PASSWORD}" ] && echo "set" || echo "MISSING"
          echo "Configure repository Secrets (and optionally Variables) under Settings → Secrets and variables → Actions."

      - name: Check Airflow secrets
        id: airflow_secrets
        env:
          AIRFLOW_API_URL: ${{ secrets.AIRFLOW_API_URL || vars.AIRFLOW_API_URL }}
          AIRFLOW_API_USERNAME: ${{ secrets.AIRFLOW_API_USERNAME }}
          AIRFLOW_API_PASSWORD: ${{ secrets.AIRFLOW_API_PASSWORD }}
        run: |
          if [ -z "${AIRFLOW_API_URL}" ] || [ -z "${AIRFLOW_API_USERNAME}" ] || [ -z "${AIRFLOW_API_PASSWORD}" ]; then
            echo "configured=false" >> "${GITHUB_OUTPUT}"
            echo "::error::Airflow secrets are missing. Configure AIRFLOW_API_URL, AIRFLOW_API_USERNAME, and AIRFLOW_API_PASSWORD."
            exit 1
          else
            echo "configured=true" >> "${GITHUB_OUTPUT}"
          fi

      - name: Trigger DAG run in Airflow
        if: steps.airflow_secrets.outputs.configured == 'true'
        env:
          AIRFLOW_API_URL: ${{ secrets.AIRFLOW_API_URL || vars.AIRFLOW_API_URL }}
          AIRFLOW_API_USERNAME: ${{ secrets.AIRFLOW_API_USERNAME }}
          AIRFLOW_API_PASSWORD: ${{ secrets.AIRFLOW_API_PASSWORD }}
          DAG_ID: credit_model_retrain_from_github_actions
        run: |
          DAG_RUN_ID="gha-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          AIRFLOW_API_URL="${AIRFLOW_API_URL%/}"
          echo "DAG_RUN_ID=${DAG_RUN_ID}" >> "${GITHUB_ENV}"
          echo "Triggering DAG '${DAG_ID}' with run id '${DAG_RUN_ID}'"

          # Airflow 3 public API uses JWT (Bearer), not HTTP Basic — see /auth/token
          TOKEN_JSON="$(curl --fail --silent --show-error \
            -X POST "${AIRFLOW_API_URL}/auth/token" \
            -H "Content-Type: application/json" \
            -d "{\"username\":\"${AIRFLOW_API_USERNAME}\",\"password\":\"${AIRFLOW_API_PASSWORD}\"}")"
          TOKEN="$(python -c 'import json,sys; print(json.loads(sys.stdin.read())["access_token"])' <<< "${TOKEN_JSON}")"

          LOGICAL_DATE="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          curl --fail --silent --show-error \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "Content-Type: application/json" \
            -X POST "${AIRFLOW_API_URL}/api/v2/dags/${DAG_ID}/dagRuns" \
            -d "{\"dag_run_id\":\"${DAG_RUN_ID}\",\"logical_date\":\"${LOGICAL_DATE}\",\"conf\":{\"triggered_by\":\"github_actions\",\"sha\":\"${GITHUB_SHA}\"}}"

      - name: Wait for retraining DAG to finish successfully
        if: steps.airflow_secrets.outputs.configured == 'true'
        env:
          AIRFLOW_API_URL: ${{ secrets.AIRFLOW_API_URL || vars.AIRFLOW_API_URL }}
          AIRFLOW_API_USERNAME: ${{ secrets.AIRFLOW_API_USERNAME }}
          AIRFLOW_API_PASSWORD: ${{ secrets.AIRFLOW_API_PASSWORD }}
          DAG_ID: credit_model_retrain_from_github_actions
        run: |
          set -euo pipefail
          if [ -z "${DAG_RUN_ID:-}" ]; then
            echo "::error::DAG_RUN_ID missing (trigger step must run first)."
            exit 1
          fi
          AIRFLOW_API_URL="${AIRFLOW_API_URL%/}"
          MAX_ATTEMPTS=60
          SLEEP_SECONDS=30

          airflow_token() {
            curl --fail --silent --show-error \
              -X POST "${AIRFLOW_API_URL}/auth/token" \
              -H "Content-Type: application/json" \
              -d "{\"username\":\"${AIRFLOW_API_USERNAME}\",\"password\":\"${AIRFLOW_API_PASSWORD}\"}"
          }

          for ATTEMPT in $(seq 1 "${MAX_ATTEMPTS}"); do
            TOKEN_JSON="$(airflow_token)"
            TOKEN="$(python -c 'import json,sys; print(json.loads(sys.stdin.read())["access_token"])' <<< "${TOKEN_JSON}")"

            RESPONSE="$(curl --fail --silent --show-error \
              -H "Authorization: Bearer ${TOKEN}" \
              -H "Content-Type: application/json" \
              "${AIRFLOW_API_URL}/api/v2/dags/${DAG_ID}/dagRuns/${DAG_RUN_ID}")"

            STATE="$(python -c 'import json,sys; print(json.loads(sys.stdin.read()).get("state",""))' <<< "${RESPONSE}")"
            echo "Attempt ${ATTEMPT}/${MAX_ATTEMPTS} - DAG run state: ${STATE}"

            if [ "${STATE}" = "success" ]; then
              echo "Retraining completed successfully."
              exit 0
            fi

            if [ "${STATE}" = "failed" ] || [ "${STATE}" = "upstream_failed" ]; then
              echo "::error::Retraining DAG run failed with state '${STATE}'."
              exit 1
            fi

            if [ "${ATTEMPT}" -eq "${MAX_ATTEMPTS}" ]; then
              echo "::error::Timed out waiting for retraining DAG to complete."
              exit 1
            fi

            sleep "${SLEEP_SECONDS}"
          done
