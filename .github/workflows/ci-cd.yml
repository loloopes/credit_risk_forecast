name: CI/CD

on:
  pull_request:
    branches: [master, main]
  push:
    branches: [master, main]

permissions:
  contents: read
  packages: write

jobs:
  ci:
    name: Run tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    env:
      PYTHONPATH: ${{ github.workspace }}
      SKIP_MODEL_LOAD: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements-ci.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Run tests
        run: python -m pytest -q tests

  cd:
    name: Build and publish API image
    needs: ci
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Docker image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/credit-api
          tags: |
            type=ref,event=branch
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./prod
          file: ./prod/dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  trigger-airflow:
    name: Trigger Airflow retraining DAG
    needs: cd
    if: >
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    steps:
      - name: Check Airflow secrets
        id: airflow_secrets
        env:
          AIRFLOW_API_URL: ${{ secrets.AIRFLOW_API_URL }}
          AIRFLOW_API_USERNAME: ${{ secrets.AIRFLOW_API_USERNAME }}
          AIRFLOW_API_PASSWORD: ${{ secrets.AIRFLOW_API_PASSWORD }}
        run: |
          if [ -z "${AIRFLOW_API_URL}" ] || [ -z "${AIRFLOW_API_USERNAME}" ] || [ -z "${AIRFLOW_API_PASSWORD}" ]; then
            echo "configured=false" >> "${GITHUB_OUTPUT}"
            echo "Airflow secrets are missing. Skipping DAG trigger."
          else
            echo "configured=true" >> "${GITHUB_OUTPUT}"
          fi

      - name: Trigger DAG run in Airflow
        if: steps.airflow_secrets.outputs.configured == 'true'
        env:
          AIRFLOW_API_URL: ${{ secrets.AIRFLOW_API_URL }}
          AIRFLOW_API_USERNAME: ${{ secrets.AIRFLOW_API_USERNAME }}
          AIRFLOW_API_PASSWORD: ${{ secrets.AIRFLOW_API_PASSWORD }}
          DAG_ID: credit_model_training_and_nannyml_monitoring
        run: |
          DAG_RUN_ID="gha-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          curl --fail --silent --show-error \
            --user "${AIRFLOW_API_USERNAME}:${AIRFLOW_API_PASSWORD}" \
            -H "Content-Type: application/json" \
            -X POST "${AIRFLOW_API_URL}/api/v1/dags/${DAG_ID}/dagRuns" \
            -d "{\"dag_run_id\":\"${DAG_RUN_ID}\",\"conf\":{\"triggered_by\":\"github_actions\",\"sha\":\"${GITHUB_SHA}\"}}"
